<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Search Jobs | BJP Jan Seva</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    /* RESET + BASE - FIXED MOBILE OVERFLOW */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1a2639 0%, #2c3e50 50%, #1e2a38 100%);
        min-height: 100vh;
        padding: 16px;
        position: relative;
        overflow-x: hidden;
    }

    /* Tricolor top bar */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #FF9933 0%, #FF9933 33%, #FFFFFF 33%, #FFFFFF 66%, #138808 66%, #138808 100%);
        opacity: 0.8;
        z-index: 10;
    }

    /* MAIN CONTAINER - prevents any child overflow */
    .container {
        max-width: 1200px;
        margin: 0 auto;
        background: rgba(15, 25, 35, 0.88);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 228, 132, 0.35);
        border-radius: 30px;
        padding: 24px 20px 32px 20px;
        width: 100%;
        overflow-x: hidden;
        box-sizing: border-box;
    }

    h2 {
        color: #FFE484;
        text-align: center;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-size: 1.6rem;
        flex-wrap: wrap;
    }

    /* FILTERS - responsive grid */
    .filters {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 32px;
        width: 100%;
    }

    .filters input,
    .filters select {
        padding: 12px 16px;
        border-radius: 40px;
        border: 1px solid rgba(255, 228, 132, 0.25);
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 0.9rem;
        outline: none;
        width: 100%;
        box-sizing: border-box;
    }

    .filters input:focus,
    .filters select:focus {
        border-color: #FFE484;
        background: rgba(0, 0, 0, 0.7);
    }

    .filters input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    /* RESULTS GRID - fixed for mobile */
    .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        width: 100%;
        box-sizing: border-box;
    }

    /* JOB CARD - NEVER overflows container */
    .job-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 228, 132, 0.25);
        border-radius: 24px;
        padding: 20px;
        transition: 0.25s ease;
        width: 100%;
        box-sizing: border-box;
        word-wrap: break-word;
        overflow-wrap: break-word;
        display: flex;
        flex-direction: column;
    }

    .job-card:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 228, 132, 0.5);
    }

    .job-title {
        font-size: 1.35rem;
        font-weight: 700;
        color: #FFE484;
        margin-bottom: 8px;
        line-height: 1.3;
        word-break: break-word;
    }

    .job-company {
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .job-company i {
        color: #FFE484;
        width: 22px;
    }

    .job-detail {
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 8px;
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
        word-break: break-word;
    }

    .job-detail i {
        width: 24px;
        color: #FFE484;
        font-size: 0.9rem;
        flex-shrink: 0;
    }

    .apply-btn {
        width: 100%;
        margin-top: 16px;
        padding: 12px 10px;
        background: linear-gradient(95deg, #2c3e50, #1e2a38);
        color: #FFE484;
        border: 1px solid rgba(255, 228, 132, 0.4);
        border-radius: 40px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .apply-btn:hover {
        background: #2c3e50;
        border-color: #FFE484;
    }

    .empty {
        text-align: center;
        padding: 50px 20px;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.2);
        border-radius: 32px;
        grid-column: 1 / -1;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 32px;
        color: #FFE484;
        text-decoration: none;
        font-weight: 500;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px 20px;
        border-radius: 40px;
        transition: 0.2s;
        border: 1px solid rgba(255, 228, 132, 0.2);
    }

    .back-link:hover {
        background: rgba(255, 228, 132, 0.15);
        gap: 12px;
    }

    /* MOBILE RESPONSIVE FIXES */
    @media (max-width: 768px) {
        body {
            padding: 12px;
        }
        .container {
            padding: 20px 16px 28px 16px;
            border-radius: 28px;
        }
        h2 {
            font-size: 1.4rem;
        }
        .filters {
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .results-grid {
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .job-card {
            padding: 18px;
        }
        .job-title {
            font-size: 1.25rem;
        }
    }

    @media (max-width: 480px) {
        .container {
            padding: 16px 12px 24px 12px;
        }
        .job-card {
            padding: 14px;
        }
        .job-title {
            font-size: 1.15rem;
        }
    }

    /* Ensure all text breaks properly */
    .job-card, .job-title, .job-company, .job-detail {
        word-break: break-word;
        overflow-wrap: break-word;
    }
</style>
</head>
<body>
<div class="container">
    <h2><i class="fa-solid fa-magnifying-glass"></i> Search Jobs</h2>
    <div class="filters">
        <input type="text" id="searchInput" placeholder="Search by title, company...">
        <select id="typeFilter">
            <option value="">All Types</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Daily Wage</option>
        </select>
        <input type="text" id="locationFilter" placeholder="Filter by location...">
    </div>
    <div id="results" class="results-grid">
        {% for job in job_posts %}
        <div class="job-card" data-title="{{ job[1]|lower }}" data-company="{{ job[2]|lower }}" data-location="{{ job[4]|lower }}" data-type="{{ job[6]|lower }}">
            <div class="job-title">{{ job[1] }}</div>
            <div class="job-company"><i class="fa-solid fa-building"></i> {{ job[2] }}</div>
            <div class="job-detail"><i class="fa-solid fa-location-dot"></i> {{ job[4] }}</div>
            <div class="job-detail"><i class="fa-solid fa-phone"></i> {{ job[3] }}</div>
            <div class="job-detail"><i class="fa-solid fa-coins"></i> {{ job[5] or 'Negotiable' }}</div>
            <div class="job-detail"><i class="fa-regular fa-clock"></i> {{ job[6] }}</div>
            <div class="job-detail">{{ job[7][:100] if job[7] else 'No description' }}...</div>
            <a href="tel:{{ job[3] }}"><button class="apply-btn"><i class="fa-solid fa-phone-alt"></i> Contact Employer</button></a>
        </div>
        {% else %}
        <div class="empty">No job posts available</div>
        {% endfor %}
    </div>
    <a href="/employment_hub" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
</div>

<script>
    // Fixed filtering with mobile-responsive support
    const searchInput = document.getElementById('searchInput');
    const typeFilter = document.getElementById('typeFilter');
    const locationFilter = document.getElementById('locationFilter');
    const cards = document.querySelectorAll('.job-card');
    const resultsDiv = document.getElementById('results');

    function filter() {
        let visible = 0;
        cards.forEach(card => {
            const title = card.dataset.title || '';
            const company = card.dataset.company || '';
            const location = card.dataset.location || '';
            const type = card.dataset.type || '';

            let match = true;

            // Search filter
            if (searchInput.value && !title.includes(searchInput.value.toLowerCase()) && !company.includes(searchInput.value.toLowerCase())) {
                match = false;
            }

            // Type filter
            if (typeFilter.value && type !== typeFilter.value.toLowerCase()) {
                match = false;
            }

            // Location filter
            if (locationFilter.value && !location.includes(locationFilter.value.toLowerCase())) {
                match = false;
            }

            card.style.display = match ? 'flex' : 'none';
            if (match) visible++;
        });

        // Show/hide empty message
        let emptyMsg = document.getElementById('dynamic-empty-msg');
        if (visible === 0 && cards.length > 0) {
            if (!emptyMsg) {
                emptyMsg = document.createElement('div');
                emptyMsg.id = 'dynamic-empty-msg';
                emptyMsg.className = 'empty';
                emptyMsg.innerHTML = '<i class="fa-solid fa-briefcase-slash"></i> No matching jobs found. Try different filters.';
                resultsDiv.appendChild(emptyMsg);
            }
        } else if (emptyMsg) {
            emptyMsg.remove();
        }
    }

    // Event listeners
    searchInput.addEventListener('input', filter);
    typeFilter.addEventListener('change', filter);
    locationFilter.addEventListener('input', filter);

    // Initial filter
    filter();
</script>
</body>
</html>
