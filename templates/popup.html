<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Success Popup</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.5);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .popup{
            background:white;
            padding:30px;
            width:350px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        .popup h2{
            color:green;
            margin-bottom:15px;
        }

        .popup p{
            font-size:16px;
            color:#333;
        }

        .popup button{
            margin-top:20px;
            padding:10px 20px;
            border:none;
            background:green;
            color:white;
            border-radius:6px;
            cursor:pointer;
            font-size:15px;
        }

        .popup button:hover{
            background:darkgreen;
        }
    </style>
</head>

<body>

<div class="overlay" id="popup">
    <div class="popup">
        <h2>Success</h2>

        <p>
            Complaint has been posted successfully.<br>
            We will take action soon.
        </p>

        <button onclick="goHome()">OK</button>
    </div>
</div>

<script>

    // Redirect automatically after 4 seconds
    setTimeout(function () {
        window.location.href = "/";
    }, 4000);

    // Redirect when button clicked
    function goHome(){
        window.location.href = "/";
    }

</script>

</body>
</html>
