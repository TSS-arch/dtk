<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose Option</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b);
        padding:20px;
    }

    .container{
        width:100%;
        max-width:400px;
        background:#ffffff;
        padding:40px 25px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .logo{
        font-size:32px;
        margin-bottom:10px;
    }

    h1{
        font-size:28px;
        color:#111827;
        margin-bottom:10px;
    }

    p{
        color:#6b7280;
        margin-bottom:35px;
        line-height:1.5;
    }

    .btn{
        display:block;
        width:100%;
        text-decoration:none;
        padding:16px;
        margin-bottom:18px;
        border-radius:12px;
        font-size:18px;
        font-weight:bold;
        transition:0.3s;
    }

    .download-btn{
        background:#2563eb;
        color:white;
    }

    .download-btn:hover{
        background:#1d4ed8;
        transform:translateY(-2px);
    }

    .browser-btn{
        background:#f3f4f6;
        color:#111827;
        border:2px solid #d1d5db;
    }

    .browser-btn:hover{
        background:#e5e7eb;
        transform:translateY(-2px);
    }

    @media(max-width:480px){
        .container{
            padding:30px 20px;
        }

        h1{
            font-size:24px;
        }

        .btn{
            font-size:16px;
            padding:14px;
        }
    }
</style>
</head>
<body>

<div class="container">

    <div class="logo">📱</div>

    <h1>Welcome</h1>

    <p>
        Download our app for a better experience or continue directly from your browser.
    </p>

    <a href="/download" class="btn download-btn" download>
        Download App
    </a>

    <a href="/apps" class="btn browser-btn">
        Use From Browser
    </a>

</div>

</body>
</html>
