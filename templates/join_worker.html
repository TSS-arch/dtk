<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Join as Worker | BJP Jan Seva</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1a2639 0%,#2c3e50 50%,#1e2a38 100%);
    min-height:100vh;
    padding:20px;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:3px;
    background:linear-gradient(90deg,#FF9933 0%,#FF9933 33%,#FFFFFF 33%,#FFFFFF 66%,#138808 66%,#138808 100%);
    opacity:0.7;
}

.container{
    max-width:900px;
    margin:auto;
    background:rgba(15,25,35,0.88);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,228,132,0.35);
    border-radius:30px;
    padding:35px;
}

h2{
    color:#FFE484;
    text-align:center;
    margin-bottom:25px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full-width{
    grid-column:span 2;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    color:#FFE9C4;
    margin-bottom:8px;
    font-weight:600;
}

label i{
    margin-right:6px;
    color:#FFE484;
}

input,
textarea{
    padding:14px;
    border-radius:16px;
    border:1px solid rgba(255,228,132,0.2);
    background:rgba(0,0,0,0.45);
    color:#fff;
    outline:none;
}

.file-upload-area{
    background:rgba(0,0,0,0.3);
    border:2px dashed rgba(255,228,132,0.4);
    border-radius:20px;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

.file-upload-area i{
    font-size:32px;
    color:#FFE484;
}

#preview{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-top:15px;
    display:none;
    border:2px solid #FFE484;
}

#map{
    height:350px;
    border-radius:20px;
    margin-top:10px;
    border:2px solid rgba(255,228,132,0.3);
}

.radius-control{
    background:rgba(0,0,0,0.35);
    padding:15px;
    border-radius:18px;
    margin:15px 0;
}

.tag{
    background:linear-gradient(135deg,#FFB347,#FF8C00);
    padding:5px 12px;
    border-radius:20px;
    display:inline-block;
    margin:3px;
    font-size:12px;
    color:white;
}

.submit-btn{
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,#FFB347,#FF8C00);
    border:none;
    border-radius:20px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
    font-size:16px;
}

.back-link{
    display:inline-block;
    margin-top:20px;
    color:#FFE484;
    text-decoration:none;
}

@media (max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }
}

/* POPUP */

.popup-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    backdrop-filter:blur(6px);
}

.popup-overlay.show{
    opacity:1;
    pointer-events:auto;
}

.popup-box{
    width:90%;
    max-width:360px;
    background:linear-gradient(145deg,#1f2c3d,#243447);
    border-radius:25px;
    padding:35px 25px;
    text-align:center;
    border:1px solid rgba(255,228,132,0.3);
    transform:scale(0.8);
    transition:0.3s;
}

.popup-overlay.show .popup-box{
    transform:scale(1);
}

.popup-box i{
    font-size:65px;
    color:#4CAF50;
    margin-bottom:15px;
}

.popup-box h3{
    color:#FFE484;
    margin-bottom:10px;
}

.popup-box p{
    color:#ddd;
    margin-bottom:20px;
    font-size:14px;
}

.popup-box button{
    background:linear-gradient(135deg,#FFB347,#FF8C00);
    border:none;
    color:white;
    padding:12px 35px;
    border-radius:15px;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <h2>
        <i class="fa-solid fa-user-plus"></i>
        Join as a Worker
    </h2>

    <form id="workerForm" enctype="multipart/form-data">

        <div class="form-grid">

            <div class="input-group">
                <label>
                    <i class="fa-solid fa-user"></i>
                    Full Name *
                </label>
                <input type="text" name="name" required>
            </div>

            <div class="input-group">
                <label>
                    <i class="fa-solid fa-phone"></i>
                    Mobile *
                </label>
                <input type="tel" name="mobile" required>
            </div>

            <div class="input-group">
                <label>
                    <i class="fa-solid fa-briefcase"></i>
                    Occupation *
                </label>
                <input type="text" name="occupation" required>
            </div>

            <div class="input-group">
                <label>
                    <i class="fa-solid fa-location-dot"></i>
                    Address
                </label>
                <input type="text" name="address">
            </div>

            <div class="full-width">

                <label>
                    <i class="fa-solid fa-camera"></i>
                    Profile Photo
                </label>

                <div class="file-upload-area"
                     onclick="document.getElementById('photo').click()">

                    <i class="fa-solid fa-cloud-upload-alt"></i>
                    <p>Click to upload</p>

                    <input type="file"
                           name="photo"
                           id="photo"
                           style="display:none;">

                </div>

                <img id="preview">

            </div>

            <div class="full-width">

                <label>
                    <i class="fa-solid fa-map-marked-alt"></i>
                    Service Coverage
                </label>

                <div id="map"></div>

                <div class="radius-control">

                    <label>
                        Radius:
                        <span id="radiusVal">10</span> KM
                    </label>

                    <input type="range"
                           id="radiusSlider"
                           min="1"
                           max="50"
                           value="10">

                </div>

                <div id="selectedAreas"></div>

            </div>

            <input type="hidden" name="service_areas" id="serviceAreas">
            <input type="hidden" name="center_lat" id="centerLat">
            <input type="hidden" name="center_lon" id="centerLon">
            <input type="hidden" name="radius_km" id="radiusKm">

        </div>

        <button type="submit" class="submit-btn">
            <i class="fa-solid fa-save"></i>
            Register as Worker
        </button>

    </form>

    <a href="/employment_hub" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Hub
    </a>

</div>

<!-- SUCCESS POPUP -->

<div id="successPopup" class="popup-overlay">

    <div class="popup-box">

        <i class="fa-solid fa-circle-check"></i>

        <h3>Registration Successful</h3>

        <p>
            Your worker profile has been submitted successfully.
        </p>

        <button onclick="closePopup()">
            OK
        </button>

    </div>

</div>

<script>

const areas = [
    {name:"Dum Dum",lat:22.6246,lon:88.4250},
    {name:"Nagerbazar",lat:22.62,lon:88.41},
    {name:"Birati",lat:22.65,lon:88.42},
    {name:"Madhyamgram",lat:22.69,lon:88.45},
    {name:"Barasat",lat:22.72,lon:88.48},
    {name:"Duttapukur",lat:22.80,lon:88.55},
    {name:"Bira",lat:22.83,lon:88.58},
    {name:"Ashoknagar",lat:22.87,lon:88.62},
    {name:"Habra",lat:22.84,lon:88.63}
];

function getDistance(lat1,lon1,lat2,lon2){

    const R=6371;

    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;

    const a=
        Math.sin(dLat/2)**2+
        Math.cos(lat1*Math.PI/180)*
        Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;

    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

const map = L.map('map').setView([22.5726,88.3639],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

let marker;
let circle;

const slider=document.getElementById("radiusSlider");
const radiusVal=document.getElementById("radiusVal");

slider.oninput=()=>{

    radiusVal.innerText=slider.value;

    updateCircle();
};

function findAreas(lat,lon){

    let selected=[];

    areas.forEach(a=>{

        if(getDistance(lat,lon,a.lat,a.lon)<=slider.value){

            selected.push(a.name);
        }
    });

    document.getElementById("serviceAreas").value=selected.join(",");

    document.getElementById("selectedAreas").innerHTML=
        selected.map(a=>`<span class="tag">${a}</span>`).join("")
        ||
        '<p style="color:rgba(255,255,255,0.5);">No areas found</p>';
}

map.on('click',e=>{

    const lat=e.latlng.lat;
    const lon=e.latlng.lng;

    if(marker) map.removeLayer(marker);

    if(circle) map.removeLayer(circle);

    marker=L.marker([lat,lon]).addTo(map);

    circle=L.circle([lat,lon],{
        radius:slider.value*1000,
        color:'#FFE484',
        fillColor:'#FFB347',
        fillOpacity:0.25
    }).addTo(map);

    document.getElementById("centerLat").value=lat;
    document.getElementById("centerLon").value=lon;
    document.getElementById("radiusKm").value=slider.value;

    findAreas(lat,lon);
});

function updateCircle(){

    if(marker && circle){

        circle.setRadius(slider.value*1000);

        document.getElementById("radiusKm").value=slider.value;

        const pos=marker.getLatLng();

        findAreas(pos.lat,pos.lng);
    }
}

document.getElementById('photo').onchange=function(e){

    const file=e.target.files[0];

    if(file){

        const reader=new FileReader();

        reader.onload=function(ev){

            const img=document.getElementById('preview');

            img.src=ev.target.result;

            img.style.display='block';
        };

        reader.readAsDataURL(file);
    }
};

if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(pos=>{

        map.setView(
            [pos.coords.latitude,pos.coords.longitude],
            13
        );
    });
}

/* FORM SUBMIT */

document.getElementById("workerForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const form=document.getElementById("workerForm");

    const formData=new FormData(form);

    try{

        const response=await fetch("/service_profile",{
            method:"POST",
            body:formData
        });

        const result=await response.text();

        console.log(result);

        document.getElementById("successPopup")
        .classList.add("show");

        form.reset();

        document.getElementById("preview")
        .style.display="none";

    }
    catch(error){

        console.log(error);
    }

});

function closePopup(){

    document.getElementById("successPopup")
    .classList.remove("show");
}

</script>

</body>
</html>
