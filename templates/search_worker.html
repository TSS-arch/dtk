<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Search Worker | BJP Jan Seva</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
    }
    
    body { 
        background: linear-gradient(135deg, #1a2639 0%, #2c3e50 50%, #1e2a38 100%); 
        min-height: 100vh; 
        padding: 16px; 
        position: relative; 
        overflow-x: hidden; /* KILL horizontal scroll on mobile */
    }
    
    body::before { 
        content: ""; 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 3px; 
        background: linear-gradient(90deg, #FF9933 0%, #FF9933 33%, #FFFFFF 33%, #FFFFFF 66%, #138808 66%, #138808 100%); 
        opacity: 0.7; 
        z-index: 10;
    }
    
    /* MAIN CONTAINER - fixed overflow & full width control */
    .container { 
        max-width: 1200px; 
        margin: 0 auto; 
        background: rgba(15, 25, 35, 0.88); 
        backdrop-filter: blur(14px); 
        border: 1px solid rgba(255, 228, 132, 0.35); 
        border-radius: 30px; 
        padding: 24px 20px 32px 20px; 
        width: 100%;
        overflow-x: hidden;   /* prevent child overflow */
        box-sizing: border-box;
    }
    
    h2 { 
        color: #FFE484; 
        text-align: center; 
        margin-bottom: 24px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px; 
        font-size: 1.5rem;
        flex-wrap: wrap;
    }
    
    /* FILTERS - responsive */
    .filters { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 15px; 
        margin-bottom: 30px; 
        width: 100%;
    }
    
    .filters input, 
    .filters select { 
        padding: 12px 16px; 
        border-radius: 40px; 
        border: 1px solid rgba(255,228,132,0.25); 
        background: rgba(0,0,0,0.55); 
        color: #fff; 
        font-size: 0.9rem;
        outline: none;
        width: 100%;
        box-sizing: border-box;
    }
    
    .filters input:focus, 
    .filters select:focus {
        border-color: #FFE484;
        background: rgba(0,0,0,0.7);
    }
    
    .filters input::placeholder {
        color: rgba(255,255,255,0.6);
    }
    
    /* RESULTS GRID - fixed mobile overflow */
    .results-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
        gap: 24px; 
        width: 100%;
        box-sizing: border-box;
    }
    
    /* WORKER CARD - never overflows container */
    .worker-card { 
        background: rgba(255,255,255,0.08); 
        border: 1px solid rgba(255,228,132,0.25); 
        border-radius: 24px; 
        overflow: hidden; 
        transition: 0.3s; 
        width: 100%;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }
    
    .worker-card:hover { 
        transform: translateY(-5px); 
        background: rgba(255,255,255,0.12); 
        border-color: rgba(255,228,132,0.5);
    }
    
    .worker-img { 
        width: 100%; 
        height: 200px; 
        object-fit: cover; 
        display: block;
        background: #2c3e50; /* fallback while loading */
    }
    
    .worker-content { 
        padding: 20px; 
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    
    .worker-name { 
        font-size: 1.35rem; 
        font-weight: bold; 
        color: #FFE484; 
        margin-bottom: 12px; 
        line-height: 1.3;
        word-break: break-word;
    }
    
    .info-row { 
        margin-bottom: 12px; 
    }
    
    .info-label { 
        font-size: 11px; 
        color: rgba(255,255,255,0.6); 
        text-transform: uppercase; 
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    .info-label i {
        width: 14px;
        font-size: 11px;
    }
    
    .info-value { 
        font-size: 14px; 
        color: #fff; 
        word-break: break-word;
        line-height: 1.4;
    }
    
    .call-btn { 
        width: 100%; 
        margin-top: 16px; 
        padding: 12px; 
        background: linear-gradient(95deg, #2c3e50, #1e2a38); 
        color: #FFE484; 
        border: 1px solid rgba(255,228,132,0.4); 
        border-radius: 40px; 
        cursor: pointer; 
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    
    .call-btn:hover { 
        background: #2c3e50; 
        border-color: #FFE484;
        gap: 12px;
    }
    
    .empty { 
        text-align: center; 
        padding: 50px 20px; 
        color: rgba(255,255,255,0.7); 
        background: rgba(0,0,0,0.2);
        border-radius: 32px;
        grid-column: 1 / -1;
    }
    
    .back-link { 
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 32px; 
        color: #FFE484; 
        text-decoration: none; 
        font-weight: 500;
        background: rgba(0,0,0,0.3);
        padding: 10px 20px;
        border-radius: 40px;
        transition: 0.2s;
        border: 1px solid rgba(255,228,132,0.2);
    }
    
    .back-link:hover {
        background: rgba(255,228,132,0.15);
        gap: 12px;
    }
    
    /* ========== MOBILE RESPONSIVE FIXES ========== */
    @media (max-width: 768px) {
        body {
            padding: 12px;
        }
        .container {
            padding: 20px 16px 28px 16px;
            border-radius: 28px;
        }
        h2 {
            font-size: 1.35rem;
            gap: 8px;
        }
        .filters {
            grid-template-columns: 1fr;  /* Stack filters vertically on mobile */
            gap: 12px;
        }
        .results-grid {
            grid-template-columns: 1fr;  /* Single column cards on mobile */
            gap: 20px;
        }
        .worker-content {
            padding: 16px;
        }
        .worker-name {
            font-size: 1.25rem;
        }
        .worker-img {
            height: 180px;
        }
        .info-value {
            font-size: 13px;
        }
    }
    
    /* Extra small devices (below 480px) */
    @media (max-width: 480px) {
        .container {
            padding: 16px 12px 24px 12px;
        }
        .worker-content {
            padding: 14px;
        }
        .worker-name {
            font-size: 1.15rem;
        }
        .call-btn {
            padding: 10px;
            font-size: 0.85rem;
        }
        .info-label {
            font-size: 10px;
        }
        .info-value {
            font-size: 12px;
        }
    }
    
    /* SAFETY: break long words and URLs */
    .worker-card,
    .worker-name,
    .info-value,
    .worker-content {
        word-break: break-word;
        overflow-wrap: break-word;
    }
    
    /* fix for phone numbers that might be long */
    .info-value {
        word-break: break-all;
    }
    
    /* ensure images don't cause overflow */
    img {
        max-width: 100%;
        height: auto;
    }
</style>
</head>
<body>
<div class="container">
    <h2><i class="fa-solid fa-users"></i> Search a Worker</h2>
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, occupation, area...">
        <select id="occupationFilter">
            <option value="">📋 All Occupations</option>
            {% for o in occupations %}
            <option value="{{ o }}">{{ o }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="results" class="results-grid">
        {% for r in results %}
        <div class="worker-card" data-name="{{ r[1]|lower }}" data-occupation="{{ r[3]|lower }}" data-area="{{ r[6]|lower }}">
            <img class="worker-img" src="/static/uploads/{{ r[5] if r[5] else 'https://via.placeholder.com/400x250?text=Worker' }}" alt="{{ r[1] }}">
            <div class="worker-content">
                <div class="worker-name">{{ r[1] }}</div>
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-briefcase"></i> Occupation</div>
                    <div class="info-value">{{ r[3] }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-phone"></i> Contact</div>
                    <div class="info-value">{{ r[2] }}</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fa-solid fa-location-dot"></i> Service Areas</div>
                    <div class="info-value">{{ r[6] }}</div>
                </div>
                <a href="tel:{{ r[2] }}" style="text-decoration: none;">
                    <button class="call-btn"><i class="fa-solid fa-phone-alt"></i> Call Worker</button>
                </a>
            </div>
        </div>
        {% else %}
        <div class="empty">No workers registered yet</div>
        {% endfor %}
    </div>
    <a href="/employment_hub" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
</div>

<script>
    // Fixed filtering with mobile-responsive handling
    const searchInput = document.getElementById('searchInput');
    const occupationFilter = document.getElementById('occupationFilter');
    const cards = document.querySelectorAll('.worker-card');
    const resultsGrid = document.getElementById('results');
    
    function filter() {
        let visible = 0;
        const searchTerm = (searchInput.value || '').toLowerCase().trim();
        const occupationTerm = (occupationFilter.value || '').toLowerCase().trim();
        
        cards.forEach(card => {
            // get dataset attributes (already lowercased from backend)
            const name = card.dataset.name || '';
            const occupation = card.dataset.occupation || '';
            const area = card.dataset.area || '';
            
            let match = true;
            
            // Search filter: checks name, occupation, or service area
            if (searchTerm !== '') {
                const inName = name.includes(searchTerm);
                const inOccupation = occupation.includes(searchTerm);
                const inArea = area.includes(searchTerm);
                if (!inName && !inOccupation && !inArea) {
                    match = false;
                }
            }
            
            // Occupation dropdown filter
            if (match && occupationTerm !== '' && occupationTerm !== 'all occupations') {
                if (occupation !== occupationTerm) {
                    match = false;
                }
            }
            
            // Apply display (flex to maintain card layout)
            card.style.display = match ? 'flex' : 'none';
            if (match) visible++;
        });
        
        // Handle empty state message dynamically
        let emptyMsg = document.getElementById('dynamic-empty-msg');
        if (visible === 0 && cards.length > 0) {
            if (!emptyMsg) {
                emptyMsg = document.createElement('div');
                emptyMsg.id = 'dynamic-empty-msg';
                emptyMsg.className = 'empty';
                emptyMsg.innerHTML = '<i class="fa-solid fa-user-slash"></i> No workers found matching your criteria. Try different keywords.';
                resultsGrid.appendChild(emptyMsg);
            }
        } else if (emptyMsg) {
            emptyMsg.remove();
        }
    }
    
    // Attach event listeners
    if (searchInput) searchInput.addEventListener('input', filter);
    if (occupationFilter) occupationFilter.addEventListener('change', filter);
    
    // Run initial filter
    filter();
    
    // Additional safety: ensure all worker-cards have proper dataset attributes
    // (in case backend data has inconsistencies)
    document.querySelectorAll('.worker-card').forEach(card => {
        // Ensure name dataset exists
        if (!card.dataset.name) {
            const nameEl = card.querySelector('.worker-name');
            if (nameEl) card.dataset.name = nameEl.innerText.toLowerCase().trim();
        }
        // Ensure occupation dataset exists
        if (!card.dataset.occupation) {
            const occEl = card.querySelector('.info-row:first-child .info-value');
            if (occEl) card.dataset.occupation = occEl.innerText.toLowerCase().trim();
        }
        // Ensure area dataset exists
        if (!card.dataset.area) {
            const areaEls = card.querySelectorAll('.info-row');
            for (let el of areaEls) {
                if (el.innerText.includes('Service Areas')) {
                    const val = el.querySelector('.info-value');
                    if (val) card.dataset.area = val.innerText.toLowerCase().trim();
                    break;
                }
            }
        }
    });
    
    // Re-run filter after dataset cleanup
    filter();
</script>
</body>
</html>
