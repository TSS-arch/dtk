<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Report Problem | Jan Seva</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    padding:20px;
    background:linear-gradient(135deg,#1a2639 0%,#2c3e50 50%,#1e2a38 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:3px;
    background:linear-gradient(90deg,
    #FF9933 0%,#FF9933 33%,
    #FFFFFF 33%,#FFFFFF 66%,
    #138808 66%,#138808 100%);
    opacity:0.7;
}

.container{
    width:100%;
    max-width:800px;
    background:rgba(15,25,35,0.82);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,228,132,0.35);
    border-radius:30px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    color:#fff;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:34px;
    font-weight:700;
    margin-bottom:8px;
    color:#FFE484;
}

.header p{
    font-size:15px;
    color:rgba(255,245,220,0.85);
    background:rgba(255,228,132,0.12);
    display:inline-block;
    padding:6px 18px;
    border-radius:40px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full-width{
    grid-column:span 2;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
    color:#FFE9C4;
}

label i{
    margin-right:6px;
    color:#FFE484;
}

input,
select,
textarea{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,228,132,0.2);
    background:rgba(0,0,0,0.35);
    color:#fff;
    font-size:14px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#FFE484;
    box-shadow:0 0 8px rgba(255,228,132,0.3);
}

textarea{
    min-height:120px;
    resize:vertical;
}

.loc-btn,
.submit-btn{
    width:100%;
    border:none;
    border-radius:16px;
    padding:14px;
    font-size:14px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    transition:0.3s ease;
}

.loc-btn{
    margin-top:12px;
    background:rgba(0,0,0,0.45);
    border:1px solid rgba(255,228,132,0.3);
}

.loc-btn:hover{
    background:rgba(255,228,132,0.2);
}

.submit-btn{
    background:linear-gradient(135deg,#FFB347,#FF8C00);
    margin-top:10px;
}

.file-box{
    background:rgba(0,0,0,0.3);
    border:2px dashed rgba(255,228,132,0.35);
    border-radius:18px;
    padding:20px;
    text-align:center;
}

.preview{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:18px;
    margin-top:15px;
    display:none;
}

#locationStatus{
    display:block;
    margin-top:10px;
    font-size:12px;
    color:#FFE9C4;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>
            <i class="fa-solid fa-flower"></i>
            Report a Problem
            <i class="fa-solid fa-flower"></i>
        </h1>

        <p>
            Submit local issues
        </p>

    </div>

    <form method="POST"
          action="/submit"
          enctype="multipart/form-data">

        <div class="form-grid">

            <!-- CATEGORY -->

            <div class="full-width input-group">

                <label>
                    <i class="fa-solid fa-layer-group"></i>
                    Problem Category
                </label>

                <select name="category" required>

                    <option value="">
                        Select Category
                    </option>

                    <option>
                        Road Damage / Potholes
                    </option>

                    <option>
                        Street Light Not Working
                    </option>

                    <option>
                        Garbage Issue
                    </option>

                    <option>
                        Water Problem
                    </option>

                    <option>
                        Crime / Theft
                    </option>

                    <option>
                        Other
                    </option>

                </select>

            </div>

            <!-- LOCATION -->

            <div class="full-width input-group">

                <label>
                    <i class="fa-solid fa-location-dot"></i>
                    Location
                </label>

                <input type="text"
                       id="location"
                       name="location"
                       readonly
                       placeholder="Enter location or use GPS"
                       required>

                <button type="button"
                        class="loc-btn"
                        onclick="getLocation()">

                    <i class="fa-solid fa-crosshairs"></i>
                    Use Current Location

                </button>

                <small id="locationStatus"></small>

            </div>

            <!-- DESCRIPTION -->

            <div class="full-width input-group">

                <label>
                    <i class="fa-solid fa-pen"></i>
                    Description
                </label>

                <textarea name="description"
                          placeholder="Describe your issue in detail..."
                          required></textarea>

            </div>

            <!-- PHOTO -->

            <div class="full-width input-group">

                <label>
                    <i class="fa-solid fa-camera"></i>
                    Upload Photo (Optional)
                </label>

                <div class="file-box">

                    <input type="file"
                           id="photo"
                           name="photo"
                           accept="image/*">

                    <img id="preview"
                         class="preview">

                </div>

            </div>

            <!-- SUBMIT -->

            <div class="full-width">

                <button class="submit-btn">

                    <i class="fa-solid fa-paper-plane"></i>
                    Submit Report

                </button>

            </div>

        </div>

    </form>

</div>

<script>

/* =========================================
   IMAGE PREVIEW
========================================= */

document.getElementById("photo")
.addEventListener("change", function(){

    const file = this.files[0];

    const preview =
        document.getElementById("preview");

    if(file){

        const reader =
            new FileReader();

        reader.onload = function(e){

            preview.src =
                e.target.result;

            preview.style.display =
                "block";
        }

        reader.readAsDataURL(file);

    }else{

        preview.style.display =
            "none";

        preview.src = "";
    }
});

/* =========================================
   DISABLE BUTTON IF LOCATION EXISTS
========================================= */

window.onload = function(){

    const input =
        document.getElementById("location");

    const btn =
        document.querySelector(".loc-btn");

    if(input.value.trim() !== ""){

        btn.disabled = true;

        btn.innerHTML =
            '<i class="fa-solid fa-check"></i> Location Added';

        btn.style.opacity = "0.7";

        btn.style.cursor = "not-allowed";
    }
}

/* =========================================
   GPS LOCATION
========================================= */

function getLocation(){

    const status =
        document.getElementById("locationStatus");

    const input =
        document.getElementById("location");

    const btn =
        document.querySelector(".loc-btn");

    /* ALREADY FILLED */

    if(input.value.trim() !== ""){

        btn.disabled = true;

        btn.innerHTML =
            '<i class="fa-solid fa-check"></i> Location Added';

        btn.style.opacity = "0.7";

        btn.style.cursor = "not-allowed";

        return;
    }

    if(!navigator.geolocation){

        status.innerText =
            "Geolocation not supported";

        status.style.color =
            "#FFB347";

        return;
    }

    status.innerText =
        "Fetching location...";

    status.style.color =
        "#FFE484";

    navigator.geolocation.getCurrentPosition(

        function(pos){

            const lat =
                pos.coords.latitude.toFixed(6);

            const lon =
                pos.coords.longitude.toFixed(6);

            input.value =
                "Lat: " + lat +
                ", Lon: " + lon;

            status.innerText =
                "✓ Location fetched successfully";

            status.style.color =
                "#90EE90";

            /* DISABLE BUTTON */

            btn.disabled = true;

            btn.innerHTML =
                '<i class="fa-solid fa-check"></i> Location Added';

            btn.style.opacity =
                "0.7";

            btn.style.cursor =
                "not-allowed";
        },

        function(error){

            status.innerText =
                "⚠ Failed to fetch location";

            status.style.color =
                "#FFB347";
        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );
}

</script>

</body>

</html>
