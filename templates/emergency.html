<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>Women Safety</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#1e2a38;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#ffffff;
    padding:25px;
    border-radius:25px;
    text-align:center;
    max-width:370px;
    width:100%;
    box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

h2{
    color:#1e2a38;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:14px;
    line-height:1.5;
    margin-bottom:20px;
}

/* BUTTON */

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    color:#fff;
    margin-top:12px;
    transition:0.3s;
}

.btn:active{
    transform:scale(0.96);
}

/* SHARE BUTTON */

.fetch{
    background:linear-gradient(135deg,#1e2a38,#32485f);
}

/* POLICE */

.police{
    background:linear-gradient(135deg,#1e2a38,#2f4257);
}

/* HELP */

.help{
    background:linear-gradient(135deg,#425d78,#5f7b99);
}

/* STATUS */

.status{
    margin-top:15px;
    font-size:13px;
    color:#444;
}

/* LOCATION BOX */

.location-box{
    margin-top:15px;
    padding:12px;
    background:#eef3f8;
    border-radius:12px;
    font-size:13px;
    word-break:break-word;
    color:#1e2a38;
    display:none;
    text-align:left;
}

/* HIDDEN TEXTBOX */

#locationData{
    display:none;
}

</style>

</head>

<body>

<div class="container">

    <h2>
        Emergency Help
    </h2>

    <!--<p>-->
    <!--    Fetch your live location and instantly share on WhatsApp.-->
    <!--</p>-->

    <!-- SINGLE HIDDEN TEXTBOX -->

    <input type="text"
           id="locationData">

    <!-- SHARE BUTTON -->

    <!--<button class="btn fetch"-->
    <!--        onclick="fetchLocationAndShare()">-->

    <!--    📍 Fetch Location & Share-->

    <!--</button>-->

    <!-- STATUS -->

    <div id="status"
         class="status">

    </div>

    <!-- LOCATION -->

    <div id="locationBox"
         class="location-box">

    </div>

    <!-- CALL POLICE -->

    <button class="btn police"
            onclick="callPolice()">

        🚓 Call Police

    </button>

    <!-- CALL HELP -->

    <button class="btn help"
            onclick="callHelpCenter()">

        ☎️ Call Help Centre

    </button>

</div>

<script>

/* =====================================================
   GLOBAL FUNCTION FOR MIT APP INVENTOR

   USE:
   setLocationFromApp(lat,lon)

   EXAMPLE:
   setLocationFromApp(22.5726,88.3639)
===================================================== */

function setLocationFromApp(lat, lon){

    /* SAVE INTO HIDDEN TEXTBOX */

    document.getElementById("locationData").value =
        lat + "," + lon;

    document.getElementById("status").innerText =
        "Location received from app.";
}

/* =====================================================
   FETCH LOCATION OR USE EXISTING LOCATION
===================================================== */

function fetchLocationAndShare(){

    const status =
        document.getElementById("status");

    let existingLocation =
        document.getElementById("locationData").value;

    /* ==========================================
       IF TEXTBOX ALREADY HAS LAT/LONG
       SKIP GPS FETCH
    ========================================== */

    if(existingLocation != ""){

        status.innerText =
            "Using existing location...";

        shareOnWhatsApp();

        return;
    }

    /* ==========================================
       OTHERWISE FETCH GPS LOCATION
    ========================================== */

    if(!navigator.geolocation){

        status.innerText =
            "Geolocation not supported!";

        return;
    }

    status.innerText =
        "Fetching your location...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            const lat =
                position.coords.latitude;

            const lon =
                position.coords.longitude;

            /* SAVE INTO TEXTBOX */

            document.getElementById("locationData")
            .value = lat + "," + lon;

            status.innerText =
                "Location fetched successfully!";

            shareOnWhatsApp();
        },

        function(error){

            status.innerText =
                "Unable to fetch location!";
        }

    );
}

/* =====================================================
   SHARE ON WHATSAPP
===================================================== */

function shareOnWhatsApp(){

    let phoneNumber = "919051225062";

    let locationData =
        document.getElementById("locationData").value;

    let parts =
        locationData.split(",");

    let lat = parts[0];
    let lon = parts[1];

    let liveLocation =
        `https://www.google.com/maps?q=${lat},${lon}`;

    /* SHOW LOCATION */

    document.getElementById("locationBox")
    .style.display = "block";

    document.getElementById("locationBox")
    .innerHTML =

        "<b>Latitude:</b> " + lat +
        "<br><br>" +

        "<b>Longitude:</b> " + lon +
        "<br><br>" +

        "<b>Google Maps:</b><br>" +
        liveLocation;

    /* WHATSAPP MESSAGE */

    let message = encodeURIComponent(

        "🚨 EMERGENCY ALERT 🚨\n\n" +

        "I need help.\n\n" +

        "Latitude: " + lat + "\n" +

        "Longitude: " + lon + "\n\n" +

        "My Live Location:\n" +

        liveLocation

    );

    let whatsappURL =
        `https://wa.me/${phoneNumber}?text=${message}`;

    /* REDIRECT DIRECTLY */

    window.location.href = whatsappURL;
}
/* =====================================================
   CALL POLICE
===================================================== */

function callPolice(){

    window.location.href = "tel:100";
}

/* =====================================================
   CALL HELP CENTRE
===================================================== */

function callHelpCenter(){

    window.location.href = "tel:9051225062";
}

</script>

</body>

</html>
