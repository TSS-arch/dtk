<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Profile | BJP Jan Seva</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #1a2639 0%, #2c3e50 50%, #1e2a38 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
    }

    /* Tricolor top bar */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #FF9933 0%, #FF9933 33%, #FFFFFF 33%, #FFFFFF 66%, #138808 66%, #138808 100%);
        opacity: 0.7;
        z-index: 1;
    }

    .container {
        width: 100%;
        max-width: 900px;
        background: rgba(15, 25, 35, 0.88);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 228, 132, 0.35);
        border-radius: 28px;
        padding: 35px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #FFE484;
        font-size: 28px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    h2 i {
        color: #FFE484;
        font-size: 28px;
    }

    .sub-header {
        text-align: center;
        margin-bottom: 30px;
        color: rgba(255, 245, 220, 0.8);
        font-size: 14px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 228, 132, 0.2);
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .full {
        grid-column: span 2;
    }

    label {
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: #FFE9C4;
        font-size: 13px;
    }

    label i {
        margin-right: 6px;
        color: #FFE484;
    }

    input, textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 228, 132, 0.2);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 14px;
        outline: none;
        transition: 0.3s ease;
    }

    input:focus, textarea:focus {
        border-color: #FFE484;
        background: rgba(0, 0, 0, 0.6);
        box-shadow: 0 0 10px rgba(255, 228, 132, 0.2);
    }

    input::placeholder, textarea::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    .photo-box {
        text-align: center;
    }

    .preview {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        margin-top: 15px;
        display: none;
        border: 3px solid #FFE484;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .upload-buttons {
        display: flex;
        gap: 12px;
        margin-top: 10px;
    }

    .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 16px;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn i {
        font-size: 16px;
    }

    .camera {
        background: linear-gradient(135deg, #2c3e50, #1e2a38);
        border: 1px solid rgba(255, 228, 132, 0.3);
    }

    .camera:hover {
        background: linear-gradient(135deg, #3e5a6f, #2c3e50);
        transform: translateY(-2px);
    }

    .upload {
        background: linear-gradient(135deg, #FFB347, #FF8C00);
        border-bottom: 2px solid #FFE484;
    }

    .upload:hover {
        background: linear-gradient(135deg, #FFC266, #FF9F2E);
        transform: translateY(-2px);
    }

    .submit-btn {
        margin-top: 25px;
        padding: 15px;
        width: 100%;
        border: none;
        background: linear-gradient(135deg, #FFB347, #FF8C00);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s ease;
        border-bottom: 2px solid #FFE484;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .submit-btn:hover {
        background: linear-gradient(135deg, #FFC266, #FF9F2E);
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    .submit-btn i {
        font-size: 18px;
    }

    .footer-note {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 228, 132, 0.2);
        color: #FFE9C4;
        font-size: 12px;
    }

    .footer-note i {
        color: #FFE484;
        margin: 0 5px;
    }

    @media (max-width: 768px) {
        body {
            padding: 12px;
        }
        .container {
            padding: 20px;
        }
        h2 {
            font-size: 24px;
        }
        .grid {
            grid-template-columns: 1fr;
        }
        .full {
            grid-column: span 1;
        }
        .preview {
            width: 120px;
            height: 120px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>
        <i class="fa-solid fa-flower"></i>
        Create Your Profile
        <i class="fa-solid fa-id-card"></i>
    </h2>


    <form method="POST" action="/save_profile" enctype="multipart/form-data">
        <div class="grid">

            <!-- Name -->
            <div>
                <label><i class="fa-solid fa-user"></i> Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>

            <!-- Mobile -->
            <div>
                <label><i class="fa-solid fa-phone"></i> Mobile Number</label>
                <input type="tel" name="mobile" placeholder="10-digit mobile number" required>
            </div>

            <!-- DOB -->
            <div>
                <label><i class="fa-solid fa-cake-candles"></i> Date of Birth</label>
                <input type="date" name="dob" required>
            </div>
             <!-- DOB -->
            <div>
                <label><i class="fa-solid fa-cake-candles"></i>Blood Group</label>
                <input type="text" name="blo" required>
            </div>

            <!-- Photo -->
            <div class="photo-box">
                <label><i class="fa-solid fa-camera"></i> Profile Photo</label>

                <div class="upload-buttons">
                    <button type="button" class="btn camera" onclick="openCamera()">
                        <i class="fa-solid fa-camera"></i> Camera
                    </button>
                    <button type="button" class="btn upload" onclick="openFile()">
                        <i class="fa-solid fa-cloud-upload-alt"></i> Upload
                    </button>
                </div>

                <input type="file" name="photo" id="photo" accept="image/*" style="display:none;">

                <img id="preview" class="preview" alt="Profile Preview">
            </div>

            <!-- Address -->
            <div class="full">
                <label><i class="fa-solid fa-location-dot"></i> Address</label>
                <textarea name="address" placeholder="Enter your complete address" required></textarea>
            </div>

        </div>

        <button class="submit-btn" type="submit">
            <i class="fa-solid fa-save"></i> Save Profile
        </button>

        <div class="footer-note">
            <i class="fa-solid fa-flower"></i> Your data is secure with us <i class="fa-solid fa-flower"></i>
        </div>
    </form>
</div>

<script>
const photoInput = document.getElementById('photo');
const preview = document.getElementById('preview');

// Preview when file selected
photoInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(file);
    } else {
        preview.style.display = 'none';
    }
});

// Open camera
function openCamera() {
    photoInput.setAttribute("capture", "environment");
    photoInput.click();
}

// Open file upload
function openFile() {
    photoInput.removeAttribute("capture");
    photoInput.click();
}
</script>

</body>
</html>
